<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
  </head>
  <body>
    <h2>Enter URL</h2>
    <form action="/shorten" method="POST">
      <input
        type="text"
        name="url"
        placeholder="Enter your URL here"
        required
      />
      <button type="submit">shorten</button>
    </form>
  </body>
</html>
